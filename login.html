<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — PostDoseRX Premium</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FDF8F4; --warm: #FEFCFA; --sand: #F5EDE4; --sand-light: #FAF6F1;
  --gold: #C9A86C; --gold-light: #E8D5B0; --gold-dark: #8B7341;
  --navy: #1B2A4A; --navy-light: #2D4166; --slate: #4A5568; --slate-light: #718096;
  --magenta: #C6168D; --magenta-light: #FEF0F7; --magenta-dark: #9B1170;
  --teal: #2A7F7F; --teal-light: #E6F5F5; --teal-dark: #1D5C5C;
  --white: #FFFFFF; --border: #E8E0D6;
  --text: #2D2D2D; --text-sec: #5A5A5A; --text-muted: #8A8A8A;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',-apple-system,sans-serif;color:var(--text);background:var(--cream);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;display:flex;align-items:center;justify-content:center}

.auth-container{max-width:400px;width:100%;padding:0 24px}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 4px 20px rgba(27,42,74,0.08)}

.auth-header{text-align:center;margin-bottom:32px}
.logo{font-family:'DM Serif Display',Georgia,serif;font-size:28px;color:var(--navy);margin-bottom:8px}
.logo-rx{color:var(--magenta)}
.auth-title{font-family:'DM Serif Display',Georgia,serif;font-size:32px;color:var(--navy);margin-bottom:8px}
.auth-subtitle{color:var(--text-sec);font-size:14px}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.form-input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;color:var(--text);background:var(--white);transition:border-color .15s,box-shadow .15s}
.form-input:focus{outline:none;border-color:var(--magenta);box-shadow:0 0 0 3px rgba(198,22,141,.1)}
.form-input::placeholder{color:var(--text-muted)}

.form-submit{width:100%;background:var(--magenta);color:var(--white);border:none;padding:16px;border-radius:8px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:8px}
.form-submit:hover{background:var(--magenta-dark)}
.form-submit:disabled{opacity:.6;cursor:not-allowed}

.auth-divider{margin:24px 0;text-align:center;color:var(--text-muted);font-size:12px;position:relative}
.auth-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.auth-divider span{background:var(--white);padding:0 16px}

.auth-links{text-align:center;margin-top:24px}
.auth-links a{color:var(--magenta);text-decoration:none;font-size:14px;font-weight:500}
.auth-links a:hover{text-decoration:underline}

.subscription-notice{background:var(--teal-light);border:1px solid var(--teal);border-radius:8px;padding:16px;margin-bottom:24px;font-size:13px;color:var(--teal-dark)}
.subscription-notice strong{color:var(--navy)}

.back-link{position:absolute;top:20px;left:20px;color:var(--slate);text-decoration:none;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.back-link:hover{color:var(--navy)}

/* Error/Success Messages */
.message{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px}
.message.error{background:rgba(220,53,69,.1);color:#dc3545;border:1px solid rgba(220,53,69,.2)}
.message.success{background:rgba(40,167,69,.1);color:#28a745;border:1px solid rgba(40,167,69,.2)}
.message.info{background:rgba(23,162,184,.1);color:#17a2b8;border:1px solid rgba(23,162,184,.2)}

/* Google OAuth Button */
.google-signin-btn{width:100%;background:var(--white);color:var(--text);border:1px solid var(--border);padding:16px;border-radius:8px;font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:20px;display:flex;align-items:center;justify-content:center}
.google-signin-btn:hover{background:var(--sand-light);border-color:var(--slate-light)}
.google-signin-btn:disabled{opacity:.6;cursor:not-allowed}

@media (max-width:480px){
.auth-card{padding:32px 24px}
.back-link{position:static;margin-bottom:20px}
}
</style>
</head>
<body>

<a href="/" class="back-link">← Back to PostDoseRX</a>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">PostDose<span class="logo-rx">RX</span></div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your premium dashboard</p>
    </div>


    <div id="message-container"></div>

    <!-- Google OAuth Login -->
    <div id="google-signin-button" style="margin-bottom:20px;"></div>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <form id="email-login-form">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="your.email@example.com" required>
      </div>
      
      <button type="submit" class="form-submit">Sign In with Email</button>
      <p style="font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center">We'll verify your subscription status</p>
    </form>

    <div class="auth-links">
      <p style="margin-bottom:12px">Not a member yet?</p>
      <a href="/#signup" class="signup-link">Become a Member</a>
    </div>

    <div class="auth-links" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <a href="mailto:support@postdoserx.com?subject=Password Reset Request">Forgot your password?</a>
    </div>
  </div>
</div>

<!-- Google OAuth -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// Google OAuth Configuration
const GOOGLE_CLIENT_ID = '301045903902-j9ibid26smhdclvi0454m355d0mroeir.apps.googleusercontent.com'; // PostDoseRX Production Client ID
const GHL_API_ENDPOINT = '/api/verify-customer'; // Local API endpoint
const IS_DEMO_MODE = false; // Set to false for production

// Initialize Google OAuth
function initializeGoogleAuth() {
  if (typeof google !== 'undefined') {
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleSignIn,
      auto_select: false,
      cancel_on_tap_outside: false
    });
    
    // Render the official Google button
    google.accounts.id.renderButton(
      document.getElementById('google-signin-button'),
      { 
        theme: 'outline', 
        size: 'large', 
        width: '100%',
        text: 'continue_with'
      }
    );
    
    console.log('Google OAuth initialized successfully');
  } else {
    console.log('Google API not loaded yet, will retry...');
    // Retry initialization after a short delay
    setTimeout(initializeGoogleAuth, 500);
  }
}

// Handle Google Sign-In
async function handleGoogleSignIn(response) {
  try {
    clearMessage();
    showMessage('Verifying your account...', 'info');
    
    // Decode Google JWT token to get user info
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = payload.email;
    const name = payload.name;
    const googleId = payload.sub;
    
    console.log('Google user:', { email, name });
    
    // Check if this is a post-checkout flow, signup flow or sign-in flow
    const urlParams = new URLSearchParams(window.location.search);
    const isPostCheckout = urlParams.get('post-checkout') === 'true';
    const isSignup = window.isSignupFlow || false;
    window.isSignupFlow = false; // Reset the flag
    
    // Check if user exists in GoHighLevel
    const customerStatus = await verifyGHLCustomer(email, isSignup);
    
    console.log('🔍 GOOGLE OAUTH DEBUG: Customer status result:', customerStatus);
    console.log('🔍 GOOGLE OAUTH DEBUG: isValidCustomer:', customerStatus.isValidCustomer);
    console.log('🔍 GOOGLE OAUTH DEBUG: needsSubscription:', customerStatus.needsSubscription);
    console.log('🔍 GOOGLE OAUTH DEBUG: tier:', customerStatus.tier);
    
    if (isPostCheckout) {
      // POST-CHECKOUT FLOW: User completed Stripe checkout, now create GHL contact and redirect to dashboard
      showMessage('Google account verified! Creating your premium account...', 'success');
      
      // Determine tier based on Stripe checkout
      // Check URL parameters for tier information, or determine from referrer
      let tier = urlParams.get('tier') || 'premium'; // Default to premium if not specified
      
      // TODO: Ideally this should come from Stripe session metadata
      // For now, we need to modify Stripe checkout URLs to include tier parameter
      console.log('🎯 Post-checkout tier determined as:', tier);
      
      // Create contact in GHL with proper tags
      try {
        const ghlResponse = await fetch('/api/ghl-integration', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create_contact',
            email: email,
            name: name || '',
            tier: tier
          })
        });
        
        const ghlResult = await ghlResponse.json();
        if (ghlResult.success) {
          console.log('✅ Post-checkout GHL contact created successfully with', `postdoserx-${tier}`, 'tag');
        } else {
          console.error('❌ GHL contact creation failed:', ghlResult);
        }
      } catch (error) {
        console.error('❌ GHL API error:', error);
      }
      
      // Generate auth token and redirect to dashboard
      const authToken = generateAuthToken(email, googleId);
      setTimeout(() => {
        const redirectUrl = urlParams.get('redirect') || 'https://app.postdoserx.com';
        const dashboardUrl = `${redirectUrl}?token=${authToken}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name || '')}&tier=${tier}&new=true`;
        window.location.href = dashboardUrl;
      }, 1500);
    } else if (isSignup) {
      // SIGNUP FLOW: Create trial account immediately to avoid redirect loops
      showMessage('Google account verified! Creating your trial account...', 'success');
      
      // Create contact in GHL with trial tags
      try {
        const ghlResponse = await fetch('/api/ghl-integration', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create_contact',
            email: email,
            name: name || '',
            tier: 'trial' // Default to trial for new signups
          })
        });
        
        const ghlResult = await ghlResponse.json();
        if (ghlResult.success) {
          console.log('✅ Signup GHL contact created successfully for:', email);
        } else {
          console.error('❌ GHL contact creation failed:', ghlResult);
        }
      } catch (error) {
        console.error('❌ GHL API error:', error);
      }
      
      // Generate auth token and redirect to dashboard with trial access
      const authToken = generateAuthToken(email, googleId);
      setTimeout(() => {
        const dashboardUrl = `https://app.postdoserx.com?token=${authToken}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name || '')}&tier=trial&new=true`;
        window.location.href = dashboardUrl;
      }, 2000);
    } else if (customerStatus.isValidCustomer && !customerStatus.needsSubscription) {
      // Existing customer with valid subscription
      console.log('🎯 TAKING DASHBOARD PATH - isValidCustomer:', customerStatus.isValidCustomer, 'needsSubscription:', customerStatus.needsSubscription);
      const authToken = generateAuthToken(email, googleId);
      const customerName = customerStatus.name || name || email.split('@')[0];
      showMessage(`Welcome back, ${customerName}! Redirecting to your ${customerStatus.tier || 'premium'} dashboard...`, 'success');
      setTimeout(() => {
        redirectToDashboardWithTier(authToken, email, customerStatus.tier, customerName);
      }, 1500);
    } else if (customerStatus.needsSubscription || !customerStatus.isValidCustomer) {
      // NEW APPROACH: Create trial account immediately for Google OAuth users
      console.log('🎯 Creating trial account for new Google OAuth user:', email);
      showMessage('Google account verified! Creating your trial account...', 'success');
      
      // Create contact in GHL with trial tags
      try {
        const ghlResponse = await fetch('/api/ghl-integration', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create_contact',
            email: email,
            name: name || '',
            tier: 'trial' // Default to trial for new users
          })
        });
        
        const ghlResult = await ghlResponse.json();
        if (ghlResult.success) {
          console.log('✅ Trial GHL contact created successfully for:', email);
        } else {
          console.error('❌ GHL contact creation failed:', ghlResult);
        }
      } catch (error) {
        console.error('❌ GHL API error:', error);
      }
      
      // Generate auth token and redirect to dashboard with trial access
      const authToken = generateAuthToken(email, googleId);
      setTimeout(() => {
        const dashboardUrl = `https://app.postdoserx.com?token=${authToken}&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name || '')}&tier=trial&new=true`;
        window.location.href = dashboardUrl;
      }, 2000);
    }
    
  } catch (error) {
    console.error('Google sign-in error:', error);
    showMessage('Authentication failed. Please try again.', 'error');
  }
}

// Verify customer in GoHighLevel
async function verifyGHLCustomer(email, isSignup = false) {
  try {
    console.log('Checking customer status for:', email, isSignup ? '(signup)' : '(signin)');
    
    // For demo mode, allow specific emails through
    if (IS_DEMO_MODE) {
      const demoCustomers = [
        'demo@postdoserx.com',
        'test@postdoserx.com',
        'customer@postdoserx.com',
        'siteoptz@gmail.com',
        'antonio@siteoptz.com',
        'siteoptz@proton.me' // Add any email you want to test with
      ];
      
      // Demo mode is disabled - skip demo user checks
      
      if (isSignup) {
        return {
          isValidCustomer: true,
          isNewCustomer: true,
          needsSubscription: true,
          tier: 'trial',
          ghlData: null
        };
      }
    }
    
    // Method 1: Direct GoHighLevel API check
    if (!IS_DEMO_MODE) {
      try {
        console.log('🔍 Checking user in GHL via direct API:', email);
        
        const GHL_API_BASE = 'https://services.leadconnectorhq.com';
        const GHL_API_KEY = 'pit-e2c103d1-89c7-4e4a-9376-e3b50257d66b';
        const GHL_LOCATION_ID = 'ECu5ScdYFmB0WnhvYoBU';
        
        const response = await fetch(`${GHL_API_BASE}/contacts/?locationId=${GHL_LOCATION_ID}&limit=100`, {
          headers: {
            'Authorization': `Bearer ${GHL_API_KEY}`,
            'Content-Type': 'application/json',
            'Version': '2021-07-28'
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          console.log('📋 GHL direct API - total contacts:', data.contacts?.length || 0);
          
          // Search for the specific email in the contacts array
          const contact = data.contacts?.find(contact => 
            contact.email && contact.email.toLowerCase() === email.toLowerCase()
          );
          
          if (contact) {
            const tags = contact.tags || [];
            console.log('✅ Found user in GHL:', contact.email);
            console.log('🏷️ User tags:', tags);
            
            // Extract user name from contact - properly capitalize
            const firstName = contact.firstName ? contact.firstName.charAt(0).toUpperCase() + contact.firstName.slice(1).toLowerCase() : '';
            const lastName = contact.lastName ? contact.lastName.charAt(0).toUpperCase() + contact.lastName.slice(1).toLowerCase() : '';
            const fullName = firstName && lastName ? `${firstName} ${lastName}` : 
                           firstName ? firstName : 
                           lastName ? lastName : 
                           contact.email.split('@')[0]; // Fallback to email username
            
            console.log('👤 User name:', fullName);
            
            // Determine tier from tags
            let tier = 'trial'; // default
            if (tags.some(tag => tag.toLowerCase().includes('premium') || tag.includes('PostDoseRX-premium') || tag.includes('postdoserx-premium'))) {
              tier = 'premium';
            } else if (tags.some(tag => tag.toLowerCase().includes('trial') || tag.includes('PostDoseRX-trial') || tag.includes('postdoserx-trial'))) {
              tier = 'trial';
            }
            
            console.log(`✅ User tier determined: ${tier}`);
            
            const result = {
              isValidCustomer: true,
              isNewCustomer: false,
              needsSubscription: false, // They have an account, no need for subscription signup
              tier: tier,
              name: fullName,
              ghlData: { tier: tier, tags: tags, contact: contact }
            };
            
            console.log('🎯 GHL VERIFICATION RESULT:', result);
            return result;
          } else {
            console.log('👤 User not found in GHL');
            return {
              isValidCustomer: false,
              isNewCustomer: true,
              needsSubscription: true,
              tier: 'trial',
              ghlData: null
            };
          }
        } else {
          console.log('GHL direct API response not ok:', response.status, 'Falling back');
        }
      } catch (apiError) {
        console.log('GHL direct API failed:', apiError.message);
      }
    }
    
    // Method 2: Fallback for new signups
    if (isSignup) {
      return {
        isValidCustomer: true,
        isNewCustomer: true,
        needsSubscription: true
      };
    }
    
    return {
      isValidCustomer: false,
      isNewCustomer: false,
      needsSubscription: true
    };
    
  } catch (error) {
    console.error('Customer verification error:', error);
    
    // If it's a signup attempt, allow it through but mark as needing subscription
    if (isSignup) {
      return {
        isValidCustomer: true,
        isNewCustomer: true,
        needsSubscription: true
      };
    }
    
    return {
      isValidCustomer: false,
      isNewCustomer: false,
      needsSubscription: true
    };
  }
}

// Email-only login form
document.getElementById('email-login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const submitBtn = this.querySelector('.form-submit');
  const originalText = submitBtn.textContent;
  const email = document.getElementById('email').value;
  
  try {
    submitBtn.textContent = 'Verifying...';
    submitBtn.disabled = true;
    clearMessage();
    
    // Check if email exists in GoHighLevel
    console.log('🔍 LOGIN DEBUG: Starting customer verification for:', email);
    const customerStatus = await verifyGHLCustomer(email, false);
    console.log('📋 LOGIN DEBUG: Customer status result:', customerStatus);
    
    if (customerStatus.isValidCustomer && !customerStatus.needsSubscription) {
      // Existing customer with valid subscription
      const authToken = generateAuthToken(email, 'email_login');
      const customerName = customerStatus.name || email.split('@')[0];
      console.log('✅ LOGIN DEBUG: Valid customer found, preparing redirect:', {
        customerName,
        tier: customerStatus.tier,
        email,
        authToken: authToken.substring(0, 20) + '...'
      });
      showMessage(`Welcome back, ${customerName}! Redirecting to your ${customerStatus.tier || 'premium'} dashboard...`, 'success');
      setTimeout(() => {
        console.log('🚀 LOGIN DEBUG: Calling redirectToDashboardWithTier');
        redirectToDashboardWithTier(authToken, email, customerStatus.tier, customerName);
      }, 1500);
    } else if (customerStatus.needsSubscription || !customerStatus.isValidCustomer) {
      // EMAIL LOGIN: For new users, suggest they use Google OAuth instead of creating loops
      showMessage('No account found. Please use "Continue with Google" above to create your account.', 'error');
      
      // Highlight the Google OAuth button to guide user
      const googleButton = document.getElementById('google-signin-button');
      if (googleButton) {
        googleButton.style.border = '2px solid var(--magenta)';
        googleButton.style.backgroundColor = 'var(--magenta-light)';
        setTimeout(() => {
          googleButton.style.border = '';
          googleButton.style.backgroundColor = '';
        }, 5000);
      }
    }
    
  } catch (error) {
    console.error('Email login error:', error);
    showMessage('Authentication failed. Please try again or contact support.', 'error');
    submitBtn.textContent = originalText;
    submitBtn.disabled = false;
  }
});

// No custom button handler needed - using official Google button

// Signup link now uses direct href - no JavaScript handler needed

// Utility functions
function generateAuthToken(email, provider) {
  const timestamp = Date.now();
  const tokenData = {
    email: email,
    provider: provider,
    timestamp: timestamp,
    expires: timestamp + (24 * 60 * 60 * 1000) // 24 hours
  };
  
  // Simple token generation (in production, use proper JWT with server-side signing)
  return 'auth_' + btoa(JSON.stringify(tokenData));
}

function redirectToDashboard(authToken, email, name = null) {
  const urlParams = new URLSearchParams(window.location.search);
  // Use app.postdoserx.com - the official dashboard URL
  const redirectUrl = urlParams.get('redirect') || 'https://app.postdoserx.com';
  
  let dashboardUrl = `${redirectUrl}?token=${authToken}&email=${encodeURIComponent(email)}`;
  if (name) {
    dashboardUrl += `&name=${encodeURIComponent(name)}`;
  }
  
  window.location.href = dashboardUrl;
}

function redirectToDashboardWithTier(authToken, email, tier = 'trial', name = null) {
  console.log('🎯 redirectToDashboardWithTier called with:', { authToken: authToken?.substring(0, 20) + '...', email, tier, name });
  
  const urlParams = new URLSearchParams(window.location.search);
  // Use app.postdoserx.com - the official dashboard URL
  const redirectUrl = urlParams.get('redirect') || 'https://app.postdoserx.com';
  
  // Include tier parameter for proper dashboard setup
  let dashboardUrl = `${redirectUrl}?tier=${tier}&email=${encodeURIComponent(email)}&token=${authToken}`;
  if (name) {
    dashboardUrl += `&name=${encodeURIComponent(name)}`;
  }
  // Add overview hash at the end
  dashboardUrl += '#overview';
  
  console.log('🚀 LOGIN DEBUG: Final redirect URL:', dashboardUrl);
  console.log('🚀 LOGIN DEBUG: Redirecting now...');
  console.log('🔥 FINAL REDIRECT URL BEING USED:', dashboardUrl);
  window.location.href = dashboardUrl;
}

function showMessage(text, type = 'error') {
  const container = document.getElementById('message-container');
  container.innerHTML = `<div class="message ${type}">${text}</div>`;
}

function clearMessage() {
  document.getElementById('message-container').innerHTML = '';
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', function() {
  // Initialize Google OAuth
  initializeGoogleAuth();
  
  // Handle URL parameters for existing users
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  const message = urlParams.get('message');
  
  if (email) {
    document.getElementById('email').value = email;
  }
  
  if (message === 'existing-user') {
    showMessage('Welcome back! Please sign in to access your account.', 'info');
  }
  
  // Auto-focus email field
  document.getElementById('email').focus();
  
  // Handle demo login for testing
  if (window.location.search.includes('demo=true')) {
    document.getElementById('email').value = 'demo@postdoserx.com';
  }
});

// Initialize Google OAuth when script loads
window.addEventListener('load', initializeGoogleAuth);
</script>

</body>
</html>
