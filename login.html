<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — PostDoseRX Premium</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FDF8F4; --warm: #FEFCFA; --sand: #F5EDE4; --sand-light: #FAF6F1;
  --gold: #C9A86C; --gold-light: #E8D5B0; --gold-dark: #8B7341;
  --navy: #1B2A4A; --navy-light: #2D4166; --slate: #4A5568; --slate-light: #718096;
  --magenta: #C6168D; --magenta-light: #FEF0F7; --magenta-dark: #9B1170;
  --teal: #2A7F7F; --teal-light: #E6F5F5; --teal-dark: #1D5C5C;
  --white: #FFFFFF; --border: #E8E0D6;
  --text: #2D2D2D; --text-sec: #5A5A5A; --text-muted: #8A8A8A;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',-apple-system,sans-serif;color:var(--text);background:var(--cream);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;display:flex;align-items:center;justify-content:center}

.auth-container{max-width:400px;width:100%;padding:0 24px}
.auth-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:40px;box-shadow:0 4px 20px rgba(27,42,74,0.08)}

.auth-header{text-align:center;margin-bottom:32px}
.logo{font-family:'DM Serif Display',Georgia,serif;font-size:28px;color:var(--navy);margin-bottom:8px}
.logo-rx{color:var(--magenta)}
.auth-title{font-family:'DM Serif Display',Georgia,serif;font-size:32px;color:var(--navy);margin-bottom:8px}
.auth-subtitle{color:var(--text-sec);font-size:14px}

.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:6px}
.form-input{width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;color:var(--text);background:var(--white);transition:border-color .15s,box-shadow .15s}
.form-input:focus{outline:none;border-color:var(--magenta);box-shadow:0 0 0 3px rgba(198,22,141,.1)}
.form-input::placeholder{color:var(--text-muted)}

.form-submit{width:100%;background:var(--magenta);color:var(--white);border:none;padding:16px;border-radius:8px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:8px}
.form-submit:hover{background:var(--magenta-dark)}
.form-submit:disabled{opacity:.6;cursor:not-allowed}

.auth-divider{margin:24px 0;text-align:center;color:var(--text-muted);font-size:12px;position:relative}
.auth-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
.auth-divider span{background:var(--white);padding:0 16px}

.auth-links{text-align:center;margin-top:24px}
.auth-links a{color:var(--magenta);text-decoration:none;font-size:14px;font-weight:500}
.auth-links a:hover{text-decoration:underline}

.subscription-notice{background:var(--teal-light);border:1px solid var(--teal);border-radius:8px;padding:16px;margin-bottom:24px;font-size:13px;color:var(--teal-dark)}
.subscription-notice strong{color:var(--navy)}

.back-link{position:absolute;top:20px;left:20px;color:var(--slate);text-decoration:none;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px}
.back-link:hover{color:var(--navy)}

/* Error/Success Messages */
.message{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px}
.message.error{background:rgba(220,53,69,.1);color:#dc3545;border:1px solid rgba(220,53,69,.2)}
.message.success{background:rgba(40,167,69,.1);color:#28a745;border:1px solid rgba(40,167,69,.2)}
.message.info{background:rgba(23,162,184,.1);color:#17a2b8;border:1px solid rgba(23,162,184,.2)}

/* Google OAuth Button */
.google-signin-btn{width:100%;background:var(--white);color:var(--text);border:1px solid var(--border);padding:16px;border-radius:8px;font-family:inherit;font-size:16px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:20px;display:flex;align-items:center;justify-content:center}
.google-signin-btn:hover{background:var(--sand-light);border-color:var(--slate-light)}
.google-signin-btn:disabled{opacity:.6;cursor:not-allowed}

@media (max-width:480px){
.auth-card{padding:32px 24px}
.back-link{position:static;margin-bottom:20px}
}
</style>
</head>
<body>

<a href="/" class="back-link">← Back to PostDoseRX</a>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo">PostDose<span class="logo-rx">RX</span></div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your premium dashboard</p>
    </div>


    <div id="message-container"></div>

    <!-- Google OAuth Login -->
    <div id="google-signin-button" style="margin-bottom:20px;"></div>

    <div class="auth-divider">
      <span>or</span>
    </div>

    <form id="email-login-form">
      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" name="email" class="form-input" placeholder="your.email@example.com" required>
      </div>
      
      <button type="submit" class="form-submit">Sign In with Email</button>
      <p style="font-size:12px;color:var(--text-muted);margin-top:8px;text-align:center">We'll verify your subscription status</p>
    </form>

    <div class="auth-links">
      <p style="margin-bottom:12px">Not a member yet?</p>
      <a href="/#signup" class="signup-link">Become a Member</a>
    </div>

    <div class="auth-links" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <a href="mailto:support@postdoserx.com?subject=Password Reset Request">Forgot your password?</a>
    </div>
  </div>
</div>

<!-- Google OAuth -->
<script src="https://accounts.google.com/gsi/client" async defer onload="initializeGoogleAuth()"></script>

<script>
// Google OAuth Configuration
const GOOGLE_CLIENT_ID = '301045903902-j9ibid26smhdclvi0454m355d0mroeir.apps.googleusercontent.com'; // PostDoseRX Production Client ID
const GHL_API_ENDPOINT = '/api/verify-customer'; // Local API endpoint
const IS_DEMO_MODE = false; // Set to false for production

// Initialize Google OAuth
function initializeGoogleAuth() {
  console.log('🔍 Google script loaded, checking for API availability...');
  
  // Check if DOM is ready and google API is available
  if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
    console.log('🔍 Initializing Google OAuth with callback:', typeof handleGoogleSignIn);
    
    try {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleSignIn,
        auto_select: false,
        cancel_on_tap_outside: false
      });
      
      console.log('🔍 Google OAuth configuration completed');
      
      // Render the official Google button with better error handling
      const buttonContainer = document.getElementById('google-signin-button');
      if (buttonContainer) {
        console.log('📍 Button container found, rendering Google button...');
        
        // Clear any existing content first
        buttonContainer.innerHTML = '';
        
        google.accounts.id.renderButton(
          buttonContainer,
          { 
            theme: 'outline', 
            size: 'large', 
            width: buttonContainer.offsetWidth || 368,
            text: 'signin_with',
            shape: 'rectangular'
          }
        );
        console.log('✅ Google OAuth button rendered successfully');
        
        // Fallback: If button didn't render after 2 seconds, show custom button
        setTimeout(() => {
          if (!buttonContainer.querySelector('div[role="button"]') && 
              buttonContainer.innerHTML.trim() === '') {
            console.log('⚠️ Official button failed to render, creating fallback...');
            buttonContainer.innerHTML = `
              <button class="google-signin-btn" onclick="google.accounts.id.prompt()">
                <svg width="20" height="20" viewBox="0 0 24 24" style="margin-right: 12px;">
                  <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                  <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                  <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                  <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Continue with Google
              </button>
            `;
          }
        }, 2000);
      } else {
        console.error('❌ Google sign-in button container not found');
      }
      
      console.log('✅ Google OAuth initialized successfully');
    } catch (error) {
      console.error('❌ Error initializing Google OAuth:', error);
      // Show fallback button
      const buttonContainer = document.getElementById('google-signin-button');
      if (buttonContainer) {
        buttonContainer.innerHTML = `
          <button class="google-signin-btn" onclick="google.accounts.id.prompt()">
            <svg width="20" height="20" viewBox="0 0 24 24" style="margin-right: 12px;">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>
        `;
      }
    }
  } else {
    console.log('⏰ Google API not ready yet, retrying in 100ms...');
    setTimeout(initializeGoogleAuth, 100);
  }
}

// Handle Google Sign-In
async function handleGoogleSignIn(response) {
  console.log('🎯 GOOGLE OAUTH CALLBACK FIRED!');
  console.log('🔍 Response received:', !!response);
  console.log('🔍 Response credential length:', response?.credential?.length);
  
  try {
    clearMessage();
    showMessage('Verifying your account...', 'info');
    
    // Decode Google JWT token to get user info
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email = payload.email;
    const name = payload.name;
    const googleId = payload.sub;
    
    console.log('🔍 Google user extracted:', { email, name, googleId });
    
    // Authenticate directly with the dashboard API (same as dashboard login.html)
    console.log('🔑 Calling dashboard auth API with Google credentials');
    
    try {
      const authResponse = await fetch('https://app.postdoserx.com/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: email,
          name: name,
          provider: 'google',
          credential: response.credential,
          stripe_session_id: null,
          returning_user: false
        })
      });

      const authResult = await authResponse.json();
      console.log('🔍 Dashboard API response:', authResult);
      
      if (authResult.success && authResult.redirectUrl) {
        const userName = name?.split(' ')[0] || email.split('@')[0];
        
        showMessage(`Welcome back, ${userName}! Redirecting to your dashboard...`, 'success');
        
        // Store the auth token for the dashboard
        if (authResult.token) {
          localStorage.setItem('auth_token', authResult.token);
          localStorage.setItem('user_email', email);
          localStorage.setItem('user_name', userName);
          localStorage.setItem('user_tier', authResult.user?.tier || 'trial');
        }
        
        setTimeout(() => {
          console.log('🚀 Redirecting to dashboard via API response:', authResult.redirectUrl);
          window.location.href = authResult.redirectUrl;
        }, 1500);
        
      } else {
        throw new Error('Dashboard auth API failed: ' + (authResult.error || 'Unknown error'));
      }
      
    } catch (authError) {
      console.error('❌ Dashboard auth API failed:', authError);
      showMessage('Authentication failed. Please try again or contact support.', 'error');
    }
    
  } catch (error) {
    console.error('Google sign-in error:', error);
    showMessage('Authentication failed. Please try again.', 'error');
  }
}

// Note: GHL verification removed - now using dashboard API authentication directly

// Email-only login form
document.getElementById('email-login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  
  const submitBtn = this.querySelector('.form-submit');
  const originalText = submitBtn.textContent;
  const email = document.getElementById('email').value;
  
  try {
    submitBtn.textContent = 'Verifying...';
    submitBtn.disabled = true;
    clearMessage();
    
    console.log('🔍 Authenticating email with dashboard API:', email);
    
    // Authenticate directly with the dashboard API (like the dashboard login.html does)
    const authResponse = await fetch('https://app.postdoserx.com/api/auth/login', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({
        email: email,
        name: email.split('@')[0], // Use email username as fallback name
        provider: 'email'
      })
    });

    const authResult = await authResponse.json();
    console.log('🔍 Dashboard API response:', authResult);
    
    if (authResult.success && authResult.redirectUrl) {
      const userName = authResult.user?.name || email.split('@')[0];
      
      showMessage(`Welcome back, ${userName}! Redirecting to your dashboard...`, 'success');
      
      // Store the auth token for the dashboard
      if (authResult.token) {
        localStorage.setItem('auth_token', authResult.token);
        localStorage.setItem('user_email', email);
        localStorage.setItem('user_name', userName);
        localStorage.setItem('user_tier', authResult.user?.tier || 'trial');
      }
      
      setTimeout(() => {
        console.log('🚀 Redirecting to dashboard via API response:', authResult.redirectUrl);
        window.location.href = authResult.redirectUrl;
      }, 1500);
      
    } else {
      // User not found or authentication failed
      console.log('❌ Authentication failed:', authResult.error || 'Unknown error');
      showMessage('No account found with that email. Please use "Continue with Google" above to sign in, or visit our homepage to create an account.', 'error');
      
      // Highlight the Google OAuth button to guide user
      const googleButton = document.getElementById('google-signin-button');
      if (googleButton) {
        googleButton.style.border = '2px solid var(--magenta)';
        googleButton.style.backgroundColor = 'var(--magenta-light)';
        setTimeout(() => {
          googleButton.style.border = '';
          googleButton.style.backgroundColor = '';
        }, 5000);
      }
    }
    
  } catch (error) {
    console.error('Email login error:', error);
    showMessage('Authentication failed. Please try again or contact support.', 'error');
  } finally {
    submitBtn.textContent = originalText;
    submitBtn.disabled = false;
  }
});

// No custom button handler needed - using official Google button

// Signup link now uses direct href - no JavaScript handler needed

// Utility functions (simplified for dashboard API integration)

function showMessage(text, type = 'error') {
  const container = document.getElementById('message-container');
  container.innerHTML = `<div class="message ${type}">${text}</div>`;
}

function clearMessage() {
  document.getElementById('message-container').innerHTML = '';
}

// Initialize when page loads
document.addEventListener('DOMContentLoaded', function() {
  console.log('🏁 Page loaded, handling URL parameters...');
  
  // Handle URL parameters for existing users
  const urlParams = new URLSearchParams(window.location.search);
  const email = urlParams.get('email');
  const message = urlParams.get('message');
  
  if (email) {
    console.log('📧 Pre-filling email from URL:', email);
    document.getElementById('email').value = email;
    
    // If user was redirected back with email, show helpful message instead of error
    showMessage('Please complete authentication using the Google button above or verify your email below.', 'info');
  }
  
  if (message === 'existing-user') {
    showMessage('Welcome back! Please sign in to access your account.', 'info');
  }
  
  // Auto-focus email field if no email pre-filled
  if (!email) {
    document.getElementById('email').focus();
  }
  
  // Handle demo login for testing
  if (window.location.search.includes('demo=true')) {
    document.getElementById('email').value = 'demo@postdoserx.com';
  }
  
  // Initialize Google OAuth after DOM is ready
  console.log('🔄 DOM ready, initializing Google OAuth...');
  if (typeof google !== 'undefined') {
    initializeGoogleAuth();
  } else {
    console.log('⏰ Google API not loaded yet, will init via onload callback');
  }
});
</script>

</body>
</html>
